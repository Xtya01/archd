version: "3.9"

services:
  backend:
    image: node:20-alpine
    container_name: archive-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      ARCHIVE_ACCESS_KEY: "YOUR_ARCHIVE_KEY"
      ARCHIVE_SECRET_KEY: "YOUR_ARCHIVE_SECRET"
      ARCHIVE_IDENTIFIER_PREFIX: "anil-fm-"
      WEBDAV_USER: "anil"
      WEBDAV_PASS: "strongpassword"
    ports:
      - "3001:3001"
    command: sh -c "npm install && node index.js"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: archive-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API: "http://backend:3001"
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
